spring.application.name=notification-service

# Local-only DB credentials are imported from application-secrets.properties,
# which is git-ignored and never committed (see .gitignore).
spring.config.import=optional:classpath:application-secrets.properties

spring.datasource.url=jdbc:postgresql://localhost:5432/notification_service
spring.datasource.driver-class-name=org.postgresql.Driver


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# --- SMS mock sender ---
notification.sms.mock.failure-rate=0.2

# --- Email sender (real SMTP) ---
# spring.mail.username / spring.mail.password come from application-secrets.properties
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
